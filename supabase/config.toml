project_id = "knowledge-vault"

[api]
enabled = true
port = 54321
schemas = ["public", "graphql_public"]
extra_search_path = ["public", "extensions"]
max_rows = 1000

[db]
port = 54322
major_version = 15

[studio]
enabled = true
port = 54323

[auth]
enabled = true
site_url = "https://knowledge-vault.ronnie-alfaro.workers.dev"
additional_redirect_urls = ["https://knowledge-vault.ronnie-alfaro.workers.dev/auth/callback", "https://knowledge-vault.ronnie-alfaro.workers.dev/update-password", "http://localhost:5173/auth/callback", "http://localhost:5173/update-password"]
jwt_expiry = 3600
enable_signup = true
enable_anonymous_sign_ins = true

[auth.email]
enable_signup = true
double_confirm_changes = true
enable_confirmations = true
max_frequency = "1m0s"
otp_length = 8

[auth.mfa.totp]
enroll_enabled = true
verify_enabled = true

[storage]
enabled = true
file_size_limit = "50MiB"

[edge_runtime]
enabled = true

[functions.semantic_embeddings]
verify_jwt = false

[functions.check_llm_config]
verify_jwt = false

[functions.process_whisper]
verify_jwt = false
